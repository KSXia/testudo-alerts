name: 6-Minute Targeted Sniper

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch: 

# This forces GitHub to use the new Node version and silences the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snipe_seats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # HEAVY DEBUGGING: This will tell us exactly where you put the file
      - name: Print Directory Structure
        run: |
          pwd
          ls -la
          echo "--- Subfolders ---"
          ls -R

      - name: Run Targeted Sniper
        env:
          WEBHOOK_SUCCESS_FAIL: ${{ secrets.WEBHOOK_SUCCESS_FAIL }}
          WEBHOOK_FAIL: ${{ secrets.WEBHOOK_FAIL }}
          WEBHOOK_STATUS_REPORT: ${{ secrets.WEBHOOK_STATUS_REPORT }}
          WEBHOOK_SEAT_STALKER: ${{ secrets.WEBHOOK_SEAT_STALKER }}
        # Updated to match the name you chose!
        run: python targeted_alerts.py

      - name: Commit and push updated state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 'add -A' stages all modified or newly created files safely 
          # without crashing if a specific file (like the log) is missing
          git add -A
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update targeted sniper config and memory" && git pull --rebase origin main && git push)
